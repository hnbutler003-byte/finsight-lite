# Railway/Nixpacks build config.
# Node is pinned to 20.x to match engines.node in package.json.
# pnpm is launched through corepack (bundled with Node 20) instead of the
# nixpkgs pnpm package, whose bundled Node interpreter resolved to 22.11.0
# and triggered "Unsupported engine" warnings during install.

[variables]
COREPACK_ENABLE_DOWNLOAD_PROMPT = "0"
# Skip corepack's registry signature verification. Corepack builds shipped
# before npm's 2025 signing key rotation fail every registry fetch with
# "Cannot find matching keyid" even when packageManager pins an exact
# version and hash. The sha512 hash in package.json packageManager still
# protects the integrity of the downloaded pnpm tarball.
COREPACK_INTEGRITY_KEYS = "0"
# Never resolve "latest" from the network; require the packageManager pin.
COREPACK_DEFAULT_TO_LATEST = "0"

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["corepack pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["corepack pnpm run build"]
