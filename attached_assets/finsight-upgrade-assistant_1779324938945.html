<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinSight Lite — Upgrade Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: hsl(262, 83%, 58%);
    --primary-dark: hsl(262, 83%, 45%);
    --secondary: hsl(32, 95%, 60%);
    --coral: hsl(15, 90%, 65%);
    --teal: hsl(190, 75%, 48%);
    --grad-1: hsl(262, 72%, 26%);
    --grad-2: hsl(288, 68%, 22%);
    --grad-3: hsl(190, 72%, 20%);
    --grad-4: hsl(262, 78%, 18%);
    --glass: rgba(255,255,255,0.13);
    --glass-border: rgba(255,255,255,0.22);
    --glass-heavy: rgba(255,255,255,0.22);
    --radius: 28px;
    --radius-inner: 18px;
    --radius-pill: 999px;
    --font-display: 'Baloo 2', cursive;
    --font-body: 'Nunito', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-display);
    background: linear-gradient(135deg, var(--grad-1) 0%, var(--grad-2) 30%, var(--grad-3) 65%, var(--grad-4) 100%);
    background-size: 400% 400%;
    animation: drift 30s ease infinite;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }

  @keyframes drift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .app { width: 100%; max-width: 760px; display: flex; flex-direction: column; gap: 20px; }

  /* Header */
  .header {
    background: var(--glass-heavy);
    backdrop-filter: blur(24px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 28px 32px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .header-top { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  .logo-badge {
    background: var(--primary);
    border-radius: 14px;
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 20px hsla(262,83%,58%,0.5);
    flex-shrink: 0;
  }
  .header h1 { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: white; line-height: 1.1; }
  .header p { font-family: var(--font-body); font-size: 14px; color: rgba(255,255,255,0.72); margin-top: 4px; line-height: 1.5; }

  /* Progress bar */
  .progress-wrap { margin-top: 18px; }
  .progress-label { font-family: var(--font-body); font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .progress-track { height: 8px; background: rgba(255,255,255,0.15); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--primary), var(--coral)); transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 0 10px hsla(262,83%,58%,0.5); }

  /* Steps nav */
  .steps-nav {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .step-chip {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-pill);
    padding: 6px 14px;
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .step-chip:hover { background: rgba(255,255,255,0.18); color: white; }
  .step-chip.active { background: var(--primary); color: white; border-color: transparent; box-shadow: 0 0 16px hsla(262,83%,58%,0.5); }
  .step-chip.done { background: rgba(34,197,94,0.25); border-color: rgba(34,197,94,0.4); color: rgba(255,255,255,0.8); }
  .step-chip .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: 0.6; }
  .step-chip.done .dot { background: #4ade80; opacity: 1; }

  /* Main card */
  .main-card {
    background: var(--glass);
    backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.18);
  }

  /* Step header */
  .step-header { padding: 24px 28px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .step-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: var(--radius-pill);
    font-family: var(--font-display); font-size: 11px; font-weight: 800;
    letter-spacing: 0.04em; margin-bottom: 10px;
  }
  .badge-urgent { background: hsla(0,80%,60%,0.25); color: #fca5a5; border: 1px solid hsla(0,80%,60%,0.35); }
  .badge-medium { background: hsla(32,95%,60%,0.2); color: #fcd34d; border: 1px solid hsla(32,95%,60%,0.35); }
  .badge-improve { background: hsla(190,75%,48%,0.2); color: #67e8f9; border: 1px solid hsla(190,75%,48%,0.35); }
  .step-title { font-family: var(--font-display); font-size: 20px; font-weight: 800; color: white; margin-bottom: 6px; }
  .step-subtitle { font-family: var(--font-body); font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.6; }

  /* Chat area */
  .chat-area { padding: 20px 28px; display: flex; flex-direction: column; gap: 14px; min-height: 220px; }

  .msg { display: flex; gap: 10px; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes popIn { from { transform: scale(0.9) translateY(6px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

  .msg-avatar {
    width: 32px; height: 32px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0; margin-top: 2px;
  }
  .ai-avatar { background: var(--primary); box-shadow: 0 0 12px hsla(262,83%,58%,0.4); }
  .user-avatar { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.6;
    max-width: calc(100% - 48px);
  }
  .ai-bubble { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.92); border-radius: 18px 18px 18px 4px; }
  .user-bubble { background: var(--primary); color: white; border-radius: 18px 18px 4px 18px; margin-left: auto; }

  .msg.user { flex-direction: row-reverse; }
  .msg.user .msg-bubble { margin-left: auto; margin-right: 0; }

  /* Code block */
  .code-block {
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius-inner);
    padding: 14px 16px;
    margin-top: 10px;
  }
  .code-block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .code-filename { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 0.04em; }
  .copy-btn {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 3px 10px;
    font-family: var(--font-display); font-size: 11px; font-weight: 700;
    color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.2s;
  }
  .copy-btn:hover { background: rgba(255,255,255,0.2); color: white; }
  .copy-btn.copied { background: rgba(34,197,94,0.2); color: #4ade80; border-color: rgba(34,197,94,0.3); }
  .code-block pre { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; color: #a5f3fc; white-space: pre-wrap; word-break: break-word; line-height: 1.6; }
  .code-block pre .kw { color: #c084fc; }
  .code-block pre .str { color: #86efac; }
  .code-block pre .cm { color: rgba(255,255,255,0.35); font-style: italic; }
  .code-block pre .num { color: #fcd34d; }

  /* Quick reply buttons */
  .quick-replies { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 28px 20px; }
  .qr-btn {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    border-radius: var(--radius-pill); padding: 8px 16px;
    font-family: var(--font-display); font-size: 13px; font-weight: 700;
    color: white; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .qr-btn:hover { background: var(--primary); border-color: transparent; box-shadow: 0 0 14px hsla(262,83%,58%,0.4); transform: translateY(-1px); }
  .qr-btn.primary-action { background: var(--primary); border-color: transparent; box-shadow: 0 0 14px hsla(262,83%,58%,0.35); }
  .qr-btn.primary-action:hover { transform: translateY(-2px); box-shadow: 0 0 22px hsla(262,83%,58%,0.55); }

  /* Input row */
  .input-row {
    padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex; gap: 10px; align-items: flex-end;
  }
  .chat-input {
    flex: 1; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.18);
    border-radius: 18px; padding: 10px 16px;
    font-family: var(--font-body); font-size: 14px; color: white;
    outline: none; resize: none; min-height: 44px; max-height: 120px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  .chat-input::placeholder { color: rgba(255,255,255,0.35); }
  .chat-input:focus { border-color: var(--primary); }
  .send-btn {
    width: 44px; height: 44px; border-radius: 14px;
    background: var(--primary); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all 0.2s; flex-shrink: 0;
    box-shadow: 0 0 14px hsla(262,83%,58%,0.4);
  }
  .send-btn:hover { transform: translateY(-2px); box-shadow: 0 0 22px hsla(262,83%,58%,0.6); }
  .send-btn:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }

  /* Typing indicator */
  .typing { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.5); animation: bounce 1.2s ease-in-out infinite; }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0.7); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

  /* Step complete */
  .step-complete {
    background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3);
    border-radius: var(--radius-inner); padding: 14px 18px;
    display: flex; align-items: center; gap: 12px; margin: 0 20px 20px;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .step-complete-icon { font-size: 24px; }
  .step-complete-text { font-family: var(--font-body); font-size: 14px; color: #86efac; font-weight: 700; }
  .step-complete-sub { font-family: var(--font-body); font-size: 12px; color: rgba(134,239,172,0.7); }

  /* Loading dots */
  .ai-bubble.loading { display: flex; align-items: center; }

  /* Scroll */
  .chat-area { overflow-y: auto; max-height: 420px; scroll-behavior: smooth; }

  /* Powered by */
  .powered-by { text-align: center; font-family: var(--font-body); font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 4px; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo-badge">🔧</div>
      <div>
        <h1>FinSight Lite — Upgrade Assistant</h1>
        <p>Your AI guide to making your app production-ready. No technical knowledge needed — just follow the steps.</p>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progress-label-text">Step 1 of 6 — Getting started</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Steps nav -->
  <div class="steps-nav" id="steps-nav"></div>

  <!-- Main chat card -->
  <div class="main-card">
    <div class="step-header" id="step-header"></div>
    <div class="chat-area" id="chat-area"></div>
    <div class="quick-replies" id="quick-replies"></div>
    <div id="step-complete-area"></div>
    <div class="input-row">
      <textarea class="chat-input" id="chat-input" placeholder="Ask anything about this step..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <div class="powered-by">Powered by Claude · FinSight Lite Upgrade Assistant</div>
</div>

<script>
const STEPS = [
  {
    id: 'rate-limiting',
    title: 'Add Rate Limiting',
    subtitle: 'Stop bots and brute-force attacks on your login page. This is the most urgent fix.',
    badge: 'urgent',
    badgeLabel: '🚨 Critical — Do first',
    context: `The user is a non-technical solo founder building FinSight Lite, a financial literacy app for Caribbean youth. Their app has NO rate limiting on login, registration or password reset endpoints. This is a security vulnerability where someone could try millions of password combinations. They need to install express-rate-limit. Their stack is Node.js Express + TypeScript. Be extremely friendly, simple and encouraging. Explain things like they're 12. When you give code, always say exactly which file to put it in and where in the file. Use encouraging language. Keep responses SHORT and friendly - max 3 short paragraphs.`,
    quickReplies: [
      { label: '🤔 What is rate limiting?', msg: 'Can you explain what rate limiting is in simple terms?' },
      { label: '📋 Give me the code', msg: 'Give me the exact code to add rate limiting and tell me exactly where to put it' },
      { label: '▶️ How do I run it in Replit?', msg: 'How do I install and run this in Replit? Step by step please' },
      { label: '✅ Done! What next?', msg: 'I added the rate limiting code. Is there anything I should check to make sure it worked?' },
    ],
    intro: `Hi! 👋 I'm your upgrade assistant. Let's make your app much safer today — starting with something called **rate limiting**.\n\nRight now, your login page has no protection against someone trying thousands of passwords automatically. Rate limiting stops that by blocking anyone who tries too many times.\n\nThe good news? It's about a **5-minute fix**. Want me to explain what to do first, or just give you the code to paste in?`
  },
  {
    id: 'session-secret',
    title: 'Fix Session Secret',
    subtitle: 'Make sure your app never starts with an insecure default password.',
    badge: 'urgent',
    badgeLabel: '🚨 Critical — Do second',
    context: `The user is a non-technical solo founder. Their app has a SESSION_SECRET that falls back to a hardcoded string if the environment variable is missing. This means if they accidentally forget to set the env var in Replit, their app runs with a known secret anyone could guess. Fix: add a startup check that crashes the app (process.exit(1)) with a clear error message if SESSION_SECRET is not set. Their stack is Node.js Express + TypeScript. Be simple, encouraging, very short responses.`,
    quickReplies: [
      { label: '🤔 Why does this matter?', msg: 'Why is a missing session secret dangerous? Explain simply' },
      { label: '📋 Show me the fix', msg: 'Show me exactly what code to add and where to put it' },
      { label: '🔑 How do I set env vars in Replit?', msg: 'How do I set environment variables in Replit? Walk me through it' },
      { label: '✅ Done!', msg: 'I made the change. How do I know it worked?' },
    ],
    intro: `Great work on step 1! 🎉 Now let's fix something sneaky — your app has a backup password it uses if the real one isn't set.\n\nThink of it like your house having a hidden spare key under the mat — except everyone knows it's there. We need to remove that spare key and make sure your app **refuses to start** if the real key is missing.\n\nWant me to explain more, or just show you the fix?`
  },
  {
    id: 'email-domain',
    title: 'Set Up Custom Email',
    subtitle: 'Switch from the test email address to your real domain so emails reach students and schools.',
    badge: 'urgent',
    badgeLabel: '🚨 Critical — Do third',
    context: `The user is a non-technical solo founder. Their app sends emails from onboarding@resend.dev which is Resend's sandbox domain. Schools and institutions have aggressive spam filters and will block this. They need to: 1) verify a custom domain in Resend (like noreply@finsightlite.com), 2) add DNS records (SPF, DKIM, DMARC), 3) update their FROM address in their email code. Be very simple, step by step, encouraging. Explain DNS records in plain English.`,
    quickReplies: [
      { label: '🤔 Why are my emails going to spam?', msg: 'Why would schools block my emails? Explain simply' },
      { label: '🌐 How do I set up Resend?', msg: 'Walk me through setting up a custom email domain in Resend step by step' },
      { label: '🔧 What are DNS records?', msg: 'What are DNS records and how do I add them? Explain like I\'m not technical' },
      { label: '✅ Done!', msg: 'I set up my custom domain. How do I update my app to use it?' },
    ],
    intro: `Now for a really important one — your app is currently sending emails from a test address that schools will mark as spam! 📧\n\nSo certificates, welcome emails, weekly digests — they might all be going straight to junk folders. This is a big deal for institutions.\n\nThe fix is setting up your own email address (like noreply@finsightlite.com) in Resend. Want me to walk you through it step by step?`
  },
  {
    id: 'routes',
    title: 'Organise Your Routes',
    subtitle: 'Split your giant routes file into smaller, manageable pieces so your app is easier to update.',
    badge: 'medium',
    badgeLabel: '⚠️ Important — Month 1',
    context: `The user is a non-technical solo founder. Their server/routes.ts file is 4,768 lines long — everything in one file. This makes it hard to find bugs and impossible to get a security audit. They need to split it into domain-specific files: auth.ts, students.ts, orgs.ts, lessons.ts, ai.ts, emails.ts. The main routes.ts then just imports and mounts them. Give very practical, simple guidance. They can use Replit AI to help do this automatically. Be encouraging.`,
    quickReplies: [
      { label: '🤔 Why split one big file?', msg: 'Why is having one big routes file a problem?' },
      { label: '🤖 Can Replit AI do this for me?', msg: 'Can I use Replit AI to split the routes file automatically? What prompt should I use?' },
      { label: '📋 Show me the structure', msg: 'Show me what the new file structure should look like and how to set it up' },
      { label: '✅ Done!', msg: 'I split the routes. What should I check to make sure nothing broke?' },
    ],
    intro: `Your app has one giant file with nearly 5,000 lines of code — that's like having one enormous notebook for your whole life! 📓\n\nThe good news: you don't have to do this manually. You can use **Replit AI** to split it for you with the right prompt.\n\nThis makes your app easier to update, and it's required before a proper security review. Want me to give you the exact prompt to paste into Replit AI?`
  },
  {
    id: 'pooling',
    title: 'Database Connection Pooling',
    subtitle: 'Stop your database from crashing when lots of users are online at once.',
    badge: 'medium',
    badgeLabel: '⚠️ Important — Month 1',
    context: `The user is a non-technical solo founder. Their app doesn't have explicit database connection pooling configured, which means when many users hit the app simultaneously (like a whole school class), the database can run out of connections and crash. They need to configure pg Pool with max: 20, idleTimeoutMillis: 30000, connectionTimeoutMillis: 2000. Their stack is Node.js + Drizzle ORM + PostgreSQL. Be very simple, explain what a connection pool is in plain English, give exact code and file location.`,
    quickReplies: [
      { label: '🤔 What is a connection pool?', msg: 'What is a database connection pool? Explain it simply' },
      { label: '📋 Give me the code', msg: 'Give me the exact code to add connection pooling and tell me which file to put it in' },
      { label: '📊 How many connections do I need?', msg: 'How do I know how many database connections my app needs?' },
      { label: '✅ Done!', msg: 'I added the pool config. How do I verify it\'s working?' },
    ],
    intro: `Imagine your database is a restaurant kitchen. Right now, every student who opens your app gets their own private chef — but the kitchen only has space for a few chefs! 🍳\n\nWhen a whole class logs in at once, the kitchen gets overwhelmed and crashes. **Connection pooling** is like having one team of chefs who efficiently share the work.\n\nThis is a small code change that makes a huge difference when schools come online. Want me to show you exactly what to add?`
  },
  {
    id: 'autoscale',
    title: 'Switch to Autoscale',
    subtitle: 'Let Replit automatically handle traffic spikes when schools come online.',
    badge: 'improve',
    badgeLabel: '💡 Upgrade — Month 2',
    context: `The user is a non-technical solo founder on Replit. They should switch from a Reserved VM (fixed resources) to Replit Autoscale, which automatically spins up more instances when many users are online and scales down to save money when quiet. Their PostgreSQL-backed sessions already survive instance cycling (important prerequisite). Their job queue uses FOR UPDATE SKIP LOCKED so multiple workers are safe. They are ready for this. Explain Autoscale in very simple terms, guide through the Replit settings, and explain the cost implications.`,
    quickReplies: [
      { label: '🤔 What is Autoscale?', msg: 'What is Replit Autoscale and how is it different from what I have now?' },
      { label: '💰 Will it cost more?', msg: 'How much will Autoscale cost compared to my current setup?' },
      { label: '⚙️ How do I switch?', msg: 'Walk me through switching to Autoscale in Replit step by step' },
      { label: '✅ I switched!', msg: 'I switched to Autoscale. What should I monitor to make sure it\'s working properly?' },
    ],
    intro: `You've done the hard security work — now let's make your app handle real traffic! 🚀\n\nRight now your app runs on a fixed server — it's like renting one taxi no matter if you have 1 passenger or 100. **Autoscale** is like having an Uber pool — more cars appear automatically when you need them, and disappear when you don't.\n\nYour app is already built correctly for this (your sessions and job queue work perfectly with multiple instances). It's basically just a toggle in Replit settings. Want me to walk you through it?`
  },
];

let currentStep = 0;
let completedSteps = new Set();
let conversationHistory = [];
let isLoading = false;

function renderStepsNav() {
  const nav = document.getElementById('steps-nav');
  nav.innerHTML = STEPS.map((s, i) => `
    <div class="step-chip ${i === currentStep ? 'active' : ''} ${completedSteps.has(i) ? 'done' : ''}" onclick="goToStep(${i})">
      <div class="dot"></div>
      ${completedSteps.has(i) ? '✓ ' : ''}${i + 1}. ${s.title.split(' ').slice(0,2).join(' ')}
    </div>
  `).join('');
}

function renderStepHeader() {
  const s = STEPS[currentStep];
  const badgeClass = { urgent: 'badge-urgent', medium: 'badge-medium', improve: 'badge-improve' }[s.badge];
  document.getElementById('step-header').innerHTML = `
    <div class="step-badge ${badgeClass}">${s.badgeLabel}</div>
    <div class="step-title">${s.title}</div>
    <div class="step-subtitle">${s.subtitle}</div>
  `;
}

function renderQuickReplies() {
  const s = STEPS[currentStep];
  document.getElementById('quick-replies').innerHTML = s.quickReplies.map((r, i) =>
    `<button class="qr-btn ${i === 0 ? '' : ''}" onclick="sendQuick('${r.msg.replace(/'/g,"\\'")}'">${r.label}</button>`
  ).join('') + `<button class="qr-btn" onclick="markDone()">✅ Mark step done</button>`;
}

function updateProgress() {
  const pct = Math.round((completedSteps.size / STEPS.length) * 100);
  const s = STEPS[currentStep];
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-label-text').textContent = `Step ${currentStep + 1} of ${STEPS.length} — ${s.title}`;
}

function addMessage(role, content, isCode = false, filename = '') {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${role === 'ai' ? 'ai-avatar' : 'user-avatar'}`;
  avatar.textContent = role === 'ai' ? '🤖' : '👤';

  const bubble = document.createElement('div');
  bubble.className = `msg-bubble ${role === 'ai' ? 'ai-bubble' : 'user-bubble'}`;

  if (isCode) {
    bubble.innerHTML = buildCodeBlock(content, filename);
  } else {
    bubble.innerHTML = formatMsg(content);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function formatMsg(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code style="background:rgba(255,255,255,0.15);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:12px">$1</code>')
    .replace(/\n/g, '<br>');
}

function buildCodeBlock(code, filename) {
  const id = 'cb_' + Math.random().toString(36).slice(2);
  const highlighted = code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(import|from|const|let|async|await|if|return|export|default|process)\b/g,'<span class="kw">$1</span>')
    .replace(/('([^']*)'|"([^"]*)")/g,'<span class="str">$1</span>')
    .replace(/(\/\/.+)/g,'<span class="cm">$1</span>')
    .replace(/\b(\d+)\b/g,'<span class="num">$1</span>');
  return `<div class="code-block">
    <div class="code-block-header">
      <span class="code-filename">${filename || 'code'}</span>
      <button class="copy-btn" id="${id}" onclick="copyCode(this,'${id}')">Copy</button>
    </div>
    <pre>${highlighted}</pre>
  </div>`;
}

function copyCode(btn, id) {
  const pre = btn.closest('.code-block').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function addTypingIndicator() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-avatar ai-avatar">🤖</div>
    <div class="msg-bubble ai-bubble loading"><div class="typing"><span></span><span></span><span></span></div></div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function callClaude(userMsg) {
  const s = STEPS[currentStep];
  conversationHistory.push({ role: 'user', content: userMsg });

  const systemPrompt = `You are a friendly, encouraging upgrade assistant for FinSight Lite, a financial literacy app for Caribbean youth built by a solo founder. ${s.context}

IMPORTANT FORMATTING RULES:
- Keep responses SHORT and conversational (2-3 short paragraphs max)
- When giving code, output it in this exact format so the UI can display it properly:
  <<<CODE:filename>>>
  the code here
  <<<END>>>
- Be warm, encouraging, use occasional emojis
- Never use technical jargon without explaining it
- Always say EXACTLY which file to edit and where in the file
- After giving code, always add a simple one-sentence "what to do next" prompt`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: conversationHistory
    })
  });

  const data = await response.json();
  const reply = data.content?.[0]?.text || 'Sorry, something went wrong. Please try again!';
  conversationHistory.push({ role: 'assistant', content: reply });
  return reply;
}

function parseAndRenderReply(reply) {
  const codeRegex = /<<<CODE:(.+?)>>>\n([\s\S]+?)<<<END>>>/g;
  let lastIndex = 0;
  let match;

  while ((match = codeRegex.exec(reply)) !== null) {
    const before = reply.slice(lastIndex, match.index).trim();
    if (before) addMessage('ai', before);
    addMessage('ai', match[2].trim(), true, match[1]);
    lastIndex = match.index + match[0].length;
  }

  const after = reply.slice(lastIndex).trim();
  if (after) addMessage('ai', after);
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg || isLoading) return;
  input.value = '';
  input.style.height = 'auto';
  await handleSend(msg);
}

async function sendQuick(msg) {
  if (isLoading) return;
  await handleSend(msg);
}

async function handleSend(msg) {
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  addMessage('user', msg);
  addTypingIndicator();

  try {
    const reply = await callClaude(msg);
    removeTypingIndicator();
    parseAndRenderReply(reply);
  } catch (e) {
    removeTypingIndicator();
    addMessage('ai', "Oops! There was a connection issue. Please try again in a moment 🙏");
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

function markDone() {
  completedSteps.add(currentStep);
  renderStepsNav();
  updateProgress();

  const area = document.getElementById('step-complete-area');
  const next = currentStep < STEPS.length - 1;
  area.innerHTML = `
    <div class="step-complete">
      <div class="step-complete-icon">🎉</div>
      <div>
        <div class="step-complete-text">Step ${currentStep + 1} complete!</div>
        <div class="step-complete-sub">${next ? 'Ready for the next upgrade?' : 'All done! Your app is much more secure now.'}</div>
      </div>
      ${next ? `<button class="qr-btn primary-action" style="margin-left:auto" onclick="goToStep(${currentStep + 1})">Next step →</button>` : ''}
    </div>
  `;
}

function goToStep(i) {
  currentStep = i;
  conversationHistory = [];
  document.getElementById('step-complete-area').innerHTML = '';
  renderStepsNav();
  renderStepHeader();
  updateProgress();

  const area = document.getElementById('chat-area');
  area.innerHTML = '';
  addMessage('ai', STEPS[i].intro);
  renderQuickReplies();
}

// Auto-resize textarea
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.getElementById('chat-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Init
goToStep(0);
</script>
</body>
